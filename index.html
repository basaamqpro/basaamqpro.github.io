<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Body Map</title>

<style>
/* ========== Mobile First Base ========== */
body{
  margin:0;
  font-family: system-ui, -apple-system, sans-serif;
  background:#f4f4f4;
  display:flex;
  justify-content:center;
  padding:20px;
}

.wrapper{
  width:100%;
  max-width:500px;
}

.bodyWrapper{
  position:relative;
  width: 100%;
}

.bodyImg{
  width:100%;
  display:block;
}

.overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* Base polygon styling */
.overlay polygon{
  fill-opacity: 0.45;
  stroke-width:3;
  transition:all 0.2s ease;
  cursor:pointer;
}

/* ---------- COLOR THEMES ---------- */

/* Upper (Red) */
#upper-clavicular{
  fill:rgb(255,0,0);
  stroke:rgb(200,0,0);
}

/* Middle (Green) */
#middle-sternal{
  fill:rgb(0,170,0);
  stroke:rgb(0,130,0);
}

/* Lower (Blue) */
#lower-abdominal{
  fill:rgb(0,120,255);
  stroke:rgb(0,90,200);
}

/* Hover / touch active (darker) */
.overlay polygon:hover{
  filter:brightness(0.75);
}

/* Selected (even darker + stronger border) */
.overlay polygon.active{
  filter: brightness(0.85);
  stroke-width:5;
  fill-opacity: 0.7;
}

/* Info panel */
.info{
  margin-top:20px;
  text-align:center;
  font-size:18px;
  font-weight:600;
}

/* Desktop spacing upgrade */
@media(min-width:768px){
  body{
    padding:40px;
  }
}

#Rectus-Abdominis-Upper-Region {
  fill:rgb(34, 0, 255);
  stroke:rgb(0, 44, 97);
}

#Rectus-Abdominis-Lower-Region {
  fill:rgb(136, 255, 0);
  stroke:rgb(5, 0, 97);
}

#Quads {
  fill: red;
  stroke:rgb(0, 0, 0);
}

#obliques {
  fill: rgb(255 223 31);
  stroke:rgb(0, 44, 97);
}

#shoulder {
  fill: blue;
  stroke:rgb(0, 0, 0);
}

#lats {
  fill: green;
  stroke:rgb(0, 0, 0);
}

#lower-back {
  fill: purple;
  stroke:rgb(0, 0, 0);
}

#middle-back {
  fill: yellow;
  stroke:rgb(0, 0, 0);
}

#traps {
  fill: #8c00ff;
  stroke:rgb(0, 0, 0);
}

#rotor-cuff {
  fill: rgb(0, 191, 255);
  stroke:rgb(0, 0, 0);
}

div#backwrapper {
    display: none;
}

* {
  border: 1px solid red;
}
</style>
</head>

<body>

  <div >
    <p id="front">Front</p>
    <p id="back">Back</p>
  </div>

<div class="wrapper">

  <div id="frontwrapper" class="bodyWrapper">
    <img src="human-body-frontal.png" class="bodyImg" alt="Body">

    <!-- 2000 x 3317 -->
    <svg class="overlay" viewBox="0 0 2000 3317">

      <polygon
        id="upper-clavicular"
        points="934,597 944,640 863,672 757,717 743,666 791,641 842,611 888,601 911,592 923,590 920,597"
      />

      <polygon
        id="middle-sternal"
        points="746,723 768,813 962,793 955,684 941,645"
      />

      <polygon
        id="lower-abdominal"
        points="773,818 958,801 925,854 865,868 817,869 785,848"
      />

       <polygon  id="Rectus-Abdominis-Upper-Region" points="879,871,985,846,1089,866,1116,984,1110,1064,990,1050,861,1066,861,993" />
       
      <polygon id="Rectus-Abdominis-Lower-Region" points="863,1083,969,1060,1010,1060,1112,1074,1112,1127,1100,1170,1105,1267,1022,1514,957,1516,879,1271,870,1175,860,1133" />
    
      <polygon id="Quads" points="1261,1626,1252,1834,1112,2002,1017,1958,994,1709,1006,1559,1100,1408,1211,1271,1234,1407" />

      <polygon id="obliques" points="1096,875,1119,977,1119,1135,1107,1256,1105,1347,1204,1258,1209,1198,1195,1142,1218,997,1254,882" />
      </svg>
  </div>

  <div id="backwrapper" class="bodyWrapper">
    <img src="human-body-back-new.png" class="bodyImg" alt="Body">

    <!-- 2000 x 3317 -->
    <svg class="overlay" viewBox="0 0 2000 3462">

      
      <!-- <polygon  id="shoulder" points="1231,601,1188,820,1330,831,1338,728,1395,693,1462,772,1444,643,1411,594,1330,546" />   -->
      <polygon  id="lats"  points="741,818,898,831,981,979,1006,1062,948,1101,881,1297,808,1278,812,1092" />
      <polygon  id="lower-back" points="1006,1071,957,1108,890,1294,990,1371,1068,1377,1174,1302,1156,1186,1114,1103,1073,1064,1029,1064" />
      <polygon  id="middle-back" points="868,606,1218,610,1204,705,1186,813,1155,885,1114,933,1070,1048,1013,1059,964,935,905,832,886,726" />
      <polygon  id="traps" points="1123,449,1087,470,1098,505,1082,594,1204,596,1269,564,1277,530,1178,498" />
      <polygon  id="rotor-cuff" points="1232,598,1326,540,1375,560,1428,618,1432,639,1451,685,1460,761,1387,676,1361,636,1303,616" />
      <polygon  id="deltoid" points="1229,615,1208,686,1204,710,1188,801,1188,829,1324,825,1333,717,1383,695,1342,629" />
       
    </svg>
  </div>

  <div class="info" id="info">
    Tap a muscle section
  </div>

</div>

<script>



document.getElementById("front").onclick = function() {
  document.getElementById("frontwrapper").style.display = "block";
  document.getElementById("backwrapper").style.display = "none";
};

document.getElementById("back").onclick = function() {
  document.getElementById("frontwrapper").style.display = "none";
  document.getElementById("backwrapper").style.display = "block";
};



const info = document.getElementById("info");

document.querySelectorAll(".overlay polygon").forEach(poly => {

  // Click for desktop
  poly.addEventListener("click", select);

  // Touch support
  poly.addEventListener("touchstart", select);

  function select(e){
    e.preventDefault();

    document.querySelectorAll(".overlay polygon")
      .forEach(p => p.classList.remove("active"));

    poly.classList.add("active");

    info.textContent = "Selected: " + poly.id.replace("-", " ");
  }
});

</script>

</body>
</html>
