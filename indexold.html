<style>
/* ========== Mobile First Base ========== */
body{
  margin:0;
  font-family: system-ui, -apple-system, sans-serif;
  background:#f4f4f4;
  display:flex;
  justify-content:center;
  padding:20px;
}

.wrapper{
  width:100%;
  max-width:500px;
}

.bodyWrapper{
  position:relative;
  width: 100%;
}

.bodyImg{
  width:100%;
  display:block;
}

.overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* Base polygon styling */
.overlay polygon{
  fill-opacity: 0.45;
  stroke-width:3;
  transition:all 0.2s ease;
  cursor:pointer;
}

/* ---------- COLOR THEMES ---------- */

/* Upper (Red) */
#upper-clavicular{
  fill:rgb(255,0,0);
  stroke:rgb(200,0,0);
}

/* Middle (Green) */
#middle-sternal{
  fill:rgb(0,170,0);
  stroke:rgb(0,130,0);
}

/* Lower (Blue) */
#lower-abdominal{
  fill:rgb(0,120,255);
  stroke:rgb(0,90,200);
}

/* Hover / touch active (darker) */
.overlay polygon:hover{
  filter:brightness(0.75);
}

/* Selected (even darker + stronger border) */
.overlay polygon.active{
  filter: brightness(0.85);
  stroke-width:5;
  fill-opacity: 0.7;
}

/* Info panel */
.info{
  margin-top:20px;
  text-align:center;
  font-size:18px;
  font-weight:600;
}

/* Desktop spacing upgrade */
@media(min-width:768px){
  body{
    padding:40px;
  }
}

#Rectus-Abdominis-Upper-Region {
  fill:rgb(34, 0, 255);
  stroke:rgb(0, 44, 97);
}

#Rectus-Abdominis-Lower-Region {
  fill:rgb(136, 255, 0);
  stroke:rgb(5, 0, 97);
}

#Quads {
  fill: red;
  stroke:rgb(0, 0, 0);
}

#obliques {
  fill: rgb(255 223 31);
  stroke:rgb(0, 44, 97);
}

#shoulder {
  fill: blue;
  stroke:rgb(0, 0, 0);
}

#lats {
  fill: green;
  stroke:rgb(0, 0, 0);
}

#lower-back {
  fill: purple;
  stroke:rgb(0, 0, 0);
}

#middle-back {
  fill: yellow;
  stroke:rgb(0, 0, 0);
}

#traps {
  fill: #8c00ff;
  stroke:rgb(0, 0, 0);
}

#rotor-cuff {
  fill: rgb(0, 191, 255);
  stroke:rgb(0, 0, 0);
}

div#backwrapper {
    display: none;
}

* {
  border: 1px solid red;
}
</style>
</head>
