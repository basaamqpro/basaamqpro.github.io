/* =========================================================

/* -------------------------
   FRONT / BACK TOGGLE
-------------------------- */

const backBtn  = document.getElementById("back");
const frontWrap = document.getElementById("frontwrapper");

  frontWrap.style.display = "block";
  backWrap.style.display  = "none";
  clearActivePolys();
});

-------------------------- */

/* -------------------------
   CONFIG / STATE
-------------------------- */
const genreOptions = ["body weight", "gym", "dumbbell", "bands"];
let selectedGenre = "";     // "" = all
let selectedMuscle = "";
let muscleButtons = [];

const elGenreRow   = document.getElementById("genre_buttons");
const elMuscleRow  = document.getElementById("muscleType_container");
const elResults    = document.getElementById("menu_information");
const elInfo       = document.getElementById("info");

/* -------------------------
   ID NORMALIZATION (fixes your only_* mismatch)
-------------------------- */
const MUSCLE_ALIAS = {
  "only_upper_abs": "upper_abs",
  "only_lower_abs": "lower_abs",
  "only_lower_chest": "lower_chest",
  "only_upper_chest": "only_upper_chest",
};
function normMuscleId(id){ return MUSCLE_ALIAS[id] || id; }
function normGenre(g){ return String(g || "").trim().toLowerCase(); }
function prettyLabel(id){ return String(id).replaceAll("_", " ").replaceAll("-", " "); }

/* -------------------------
   POLYGONS
-------------------------- */
function getAllPolygons(){
  return document.querySelectorAll(".overlay polygon");
}
function clearActivePolys(){
  getAllPolygons().forEach(p => p.classList.remove("active"));
}
function setActivePolyById(id){
  clearActivePolys();
  const poly = document.getElementById(id);
  if (poly) poly.classList.add("active");
}
function bindPolygons(){
  getAllPolygons().forEach(poly => {
    const handler = (e) => { e.preventDefault(); onMuscleSelected(poly.id); };
    poly.addEventListener("click", handler);
    poly.addEventListener("touchstart", handler, { passive:false });
  });
}

/* -------------------------
   MUSCLE SELECTION
-------------------------- */
function getRelatedGroup(polyId){
  const map = {
    "only_upper_chest":"all_chest",
    "middle_chest":"all_chest",
    "lower_chest":"all_chest",

    "upper_abs":"all_abs",
    "lower_abs":"all_abs",
    "obliques":"all_abs",

    "quads":"all_legs",
    "hamstring":"all_legs",

    "lats":"all_back",
    "middle_back":"all_back",
    "lower_back":"all_back",
    "traps":"all_back",
    "rotor_cuff":"all_back",
    "deltoid":"all_back",
  };
  return map[polyId] || "";
}

function onMuscleSelected(polyId){
  selectedMuscle = polyId;
  setActivePolyById(polyId);

  const related = getRelatedGroup(polyId);
  muscleButtons = related ? [polyId, related] : [polyId];

  renderMuscleButtons();
  renderResults();

  if (elInfo) elInfo.textContent = `Selected: ${prettyLabel(polyId)}`;
}

/* -------------------------
   GENRE CHIPS
-------------------------- */
function renderGenreButtons(){
  elGenreRow.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.type = "button";
  allBtn.textContent = "all";
  allBtn.onclick = () => { selectedGenre = ""; renderResults(); highlightSelectedGenre(); };
  elGenreRow.appendChild(allBtn);

  genreOptions.forEach(g => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = g;
    btn.onclick = () => { selectedGenre = g; renderResults(); highlightSelectedGenre(); };
    elGenreRow.appendChild(btn);
  });

  highlightSelectedGenre();
}

function highlightSelectedGenre(){
  [...elGenreRow.querySelectorAll("button")].forEach(btn => {
    const isAll = btn.textContent.toLowerCase() === "all";
    const active = (selectedGenre === "" && isAll) || (btn.textContent === selectedGenre);
    btn.dataset.active = active ? "true" : "false";
  });
}

/* -------------------------
   MUSCLE CHIPS
-------------------------- */
function renderMuscleButtons(){
  elMuscleRow.innerHTML = "";
  muscleButtons.forEach(id => {
    if (!id) return;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = prettyLabel(id);
    btn.onclick = () => {
      selectedMuscle = id;
      setActivePolyById(id);
      renderResults();
      if (elInfo) elInfo.textContent = `Selected: ${prettyLabel(id)}`;
    };
    elMuscleRow.appendChild(btn);
  });
}

/* -------------------------
   YOUTUBE PLAYER OVERLAY
   (created dynamically, no HTML edits)
-------------------------- */
let playerOverlay = null;
let playerIframe = null;

function getYouTubeId(url){
  try{
    const u = new URL(url);
    // youtu.be/<id>
    if (u.hostname.includes("youtu.be")) return u.pathname.replace("/", "");
    // youtube.com/watch?v=<id>
    return u.searchParams.get("v") || "";
  }catch{
    // fallback regex
    const m = String(url).match(/[?&]v=([^&]+)/);
    return m ? m[1] : "";
  }
}

function ensurePlayerOverlay(){
  if (playerOverlay) return;

  playerOverlay = document.createElement("div");
  playerOverlay.id = "ytOverlay";
  playerOverlay.setAttribute("role", "dialog");
  playerOverlay.setAttribute("aria-modal", "true");

  // Minimal inline styles so it works even if you don’t add CSS
  playerOverlay.style.position = "fixed";
  playerOverlay.style.inset = "0";
  playerOverlay.style.zIndex = "9999";
  playerOverlay.style.display = "none";
  playerOverlay.style.alignItems = "center";
  playerOverlay.style.justifyContent = "center";
  playerOverlay.style.padding = "18px";
  playerOverlay.style.background = "rgba(0,0,0,.72)";
  playerOverlay.style.backdropFilter = "blur(10px)";
  playerOverlay.style.webkitBackdropFilter = "blur(10px)";

  const modal = document.createElement("div");
  modal.id = "ytModal";
  modal.style.width = "min(900px, 100%)";
  modal.style.borderRadius = "22px";
  modal.style.overflow = "hidden";
  modal.style.background = "rgba(14,16,22,.95)";
  modal.style.border = "1px solid rgba(255,255,255,.12)";
  modal.style.boxShadow = "0 25px 80px rgba(0,0,0,.6)";

  const top = document.createElement("div");
  top.style.display = "flex";
  top.style.alignItems = "center";
  top.style.justifyContent = "space-between";
  top.style.padding = "12px 12px 10px";
  top.style.borderBottom = "1px solid rgba(255,255,255,.10)";

  const title = document.createElement("div");
  title.id = "ytTitle";
  title.style.color = "rgba(255,255,255,.9)";
  title.style.fontWeight = "800";
  title.style.fontSize = "14px";
  title.style.padding = "0 8px";
  title.style.whiteSpace = "nowrap";
  title.style.overflow = "hidden";
  title.style.textOverflow = "ellipsis";

  const close = document.createElement("button");
  close.type = "button";
  close.textContent = "✕";
  close.setAttribute("aria-label", "Close video");
  close.style.cursor = "pointer";
  close.style.border = "1px solid rgba(255,255,255,.12)";
  close.style.background = "rgba(255,255,255,.06)";
  close.style.color = "rgba(255,255,255,.92)";
  close.style.borderRadius = "999px";
  close.style.width = "40px";
  close.style.height = "40px";
  close.style.fontSize = "16px";
  close.onclick = closePlayer;

  top.appendChild(title);
  top.appendChild(close);

  const frameWrap = document.createElement("div");
  frameWrap.style.position = "relative";
  frameWrap.style.width = "100%";
  frameWrap.style.aspectRatio = "16 / 9";
  frameWrap.style.background = "#000";

  playerIframe = document.createElement("iframe");
  playerIframe.id = "ytFrame";
  playerIframe.style.position = "absolute";
  playerIframe.style.inset = "0";
  playerIframe.style.width = "100%";
  playerIframe.style.height = "100%";
  playerIframe.style.border = "0";
  playerIframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
  playerIframe.allowFullscreen = true;

  frameWrap.appendChild(playerIframe);

  modal.appendChild(top);
  modal.appendChild(frameWrap);
  playerOverlay.appendChild(modal);
  document.body.appendChild(playerOverlay);

  // click outside to close
  playerOverlay.addEventListener("click", (e) => {
    if (e.target === playerOverlay) closePlayer();
  });

  // ESC to close
  window.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && playerOverlay.style.display !== "none") closePlayer();
  });
}

function openPlayer(videoUrl, displayTitle){
  const id = getYouTubeId(videoUrl);
  if (!id) return;

  ensurePlayerOverlay();

  const titleEl = document.getElementById("ytTitle");
  if (titleEl) titleEl.textContent = displayTitle || "Workout video";

  // autoplay + modest branding
  playerIframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;
  playerOverlay.style.display = "flex";

  // prevent background scroll while open
  document.documentElement.style.overflow = "hidden";
  document.body.style.overflow = "hidden";
}

function closePlayer(){
  if (!playerOverlay) return;
  playerOverlay.style.display = "none";
  if (playerIframe) playerIframe.src = ""; // stop playback
  document.documentElement.style.overflow = "";
  document.body.style.overflow = "";
}

/* -------------------------
   RESULTS LIST
   Click card -> opens embed player
-------------------------- */
function renderResults(){
  elResults.innerHTML = "";
  if (!selectedMuscle) return;

  const wantedMuscle = normMuscleId(selectedMuscle);
  const wantedGenre  = normGenre(selectedGenre);
  const entries = data.flat();

  const filtered = entries.filter(row => {
    const url = row?.[0];
    const muscle = normMuscleId(row?.[1]?.[0] || "");
    const genre  = normGenre(row?.[2]?.[0] || "");
    if (!url) return false;
    if (muscle !== wantedMuscle) return false;
    if (wantedGenre === "") return true;
    return genre === wantedGenre;
  });

  if (filtered.length === 0) {
    const empty = document.createElement("div");
    empty.className = "video_container";
    empty.innerHTML = `
      <p>${prettyLabel(selectedMuscle)}</p>
      <p>${selectedGenre ? selectedGenre : "all equipment"}</p>
      <p>No videos found for this filter.</p>
      <p>Try another equipment tag.</p>
    `;
    elResults.appendChild(empty);
    return;
  }

  filtered.forEach(row => {
    const url = row[0];
    const muscle = normMuscleId(row[1][0]);
    const genre  = row[2][0];
    const title  = row[3][0] || "Workout";
    const channel= row[3][1] || "";

    const card = document.createElement("div");
    card.className = "video_container";

    // Keep your overlay <a> for accessibility, but we’ll intercept click to open player
    const a = document.createElement("a");
    a.href = url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.setAttribute("aria-label", title);

    // Intercept: open player instead of navigating
    a.addEventListener("click", (e) => {
      e.preventDefault();
      openPlayer(url, title);
    });

    const pMuscle = document.createElement("p");
    pMuscle.textContent = prettyLabel(muscle);

    const pGenre = document.createElement("p");
    pGenre.textContent = genre;

    const pTitle = document.createElement("p");
    pTitle.textContent = title;

    const pChannel = document.createElement("p");
    pChannel.textContent = channel;

    card.appendChild(a);
    card.appendChild(pMuscle);
    card.appendChild(pGenre);
    card.appendChild(pTitle);
    card.appendChild(pChannel);

    elResults.appendChild(card);
  });
}

   INIT

(function init(){
  bindPolygons();
  renderGenreButtons();

  // default state
  frontWrap.style.display = "block";
  backWrap.style.display  = "none";

  // Optional default selection:

})();
</script>
